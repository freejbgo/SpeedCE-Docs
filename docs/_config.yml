title: SpeedCE 站长知识库
description: 多节点网站测速、网络排障与 SpeedCE 使用指南 — 100 篇站长技术文章
url: "https://freejbgo.github.io"
baseurl: "/speedce-docs"
lang: zh-CN

theme: jekyll-theme-cayman

plugins:
  - jekyll-seo-tag

markdown: kramdown
kramdown:
  input: GFM

defaults:
  - scope:
      path: "articles"
      type: "pages"
    values:
      layout: article
  - scope:
      path: ""
      type: "pages"
    values:
      layout: default

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
