<!DOCTYPE html>
<html lang="{{ site.lang | default: 'zh-CN' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  {% seo_tag %}
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <style>
    .site-nav { margin: 1rem 0 1.5rem; padding: 0.75rem 0; border-bottom: 1px solid #e1e4e8; }
    .site-nav a { margin-right: 1rem; }
    .category-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 0.75rem; margin: 1rem 0; }
    .category-card { padding: 0.75rem 1rem; border: 1px solid #e1e4e8; border-radius: 6px; }
    .category-card strong { display: block; margin-bottom: 0.25rem; }
    .footer-note { margin-top: 2rem; padding-top: 1rem; border-top: 1px solid #e1e4e8; color: #586069; font-size: 0.9rem; }
  </style>
</head>
<body>
  <section class="page-header">
    <h1 class="project-name"><a href="{{ '/' | relative_url }}" style="color: inherit; text-decoration: none;">{{ site.title }}</a></h1>
    <h2 class="project-tagline">{{ site.description }}</h2>
    <a href="https://www.speedce.com" class="btn">SpeedCE 官网</a>
    <a href="https://speedce.com/?lang=zh-CN" class="btn">中文版测速</a>
    <a href="{{ '/articles/' | relative_url }}" class="btn">全部文章</a>
  </section>

  <section class="main-content">
    <nav class="site-nav">
      <a href="{{ '/' | relative_url }}">首页</a>
      <a href="{{ '/articles/' | relative_url }}">100 篇文章</a>
      <a href="{{ '/categories/' | relative_url }}">分类索引</a>
      <a href="{{ '/sitemap.xml' | relative_url }}">站点地图</a>
      <a href="https://github.com/freejbgo/speedce-docs">GitHub</a>
    </nav>
    {{ content }}
    <div class="footer-note">
      <p>SpeedCE — 覆盖中国各省市 · 全球节点 · 一键检测网络连通性</p>
      <p>官网：<a href="https://www.speedce.com">speedce.com</a> | 联系：speedceads@gmail.com</p>
    </div>
  </section>
</body>
</html>
